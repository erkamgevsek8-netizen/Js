<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Akıllı To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Görev Listesi</h1>
            <p>Konuşarak görev ekle!</p>
        </div>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Yeni görev ekle..." class="task-input">
            <button id="addBtn" class="add-btn">➕</button>
            <button id="voiceBtn" class="add-btn" style="background: #50c878;">🎤</button>
        </div>

        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">Tümü</button>
            <button class="filter-btn" data-filter="active">Aktif</button>
            <button class="filter-btn" data-filter="completed">Tamamlanan</button>
        </div>

        <div class="task-count"><span id="taskCount">0</span> görev kaldı</div>
        <ul id="taskList" class="task-list"></ul>
        <div id="emptyState" class="empty-state">🎉 Hoşgeldiniz!</div>
        <button id="clearAllBtn" class="clear-all-btn">🗑️ Tümünü Temizle</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
