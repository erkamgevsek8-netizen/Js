<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 To-Do List - Görev Listesi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📝 Görev Listesi</h1>
            <p>Yapılacakları takip et</p>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <input 
                type="text" 
                id="taskInput" 
                placeholder="Yeni görev ekle..."
                class="task-input"
            >
            <button id="addBtn" class="add-btn">➕ Ekle</button>
        </div>

        <!-- Filter Buttons -->
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">Tümü</button>
            <button class="filter-btn" data-filter="active">Aktif</button>
            <button class="filter-btn" data-filter="completed">Tamamlanan</button>
        </div>

        <!-- Task Count -->
        <div class="task-count">
            <span id="taskCount">0</span> görev kaldı
        </div>

        <!-- Tasks List -->
        <ul id="taskList" class="task-list">
            <!-- Görevler buraya eklenecek -->
        </ul>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state">
            <p>🎉 Hoşgeldiniz!</p>
            <p>Yukarıya görev yazıp "Ekle" butonuna basın</p>
        </div>

        <!-- Clear All Button -->
        <button id="clearAllBtn" class="clear-all-btn">🗑️ Tümünü Temizle</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
